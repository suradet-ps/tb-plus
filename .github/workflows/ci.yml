name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ──────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run ci

      - name: TypeScript type check
        run: bun run type-check

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Vitest
        run: bun run test

  # ── Design system enforcement ─────────────────────────────────────
  design-enforcement:
    name: No Inline Hex Colors
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check for raw #rrggbb in Vue components
        run: |
          # Exclude variables.css (palette primitives belong there)
          violations=$(grep -rn '#[0-9a-fA-F]\{6\}' src/ \
            --include='*.vue' \
            --include='*.css' \
            --exclude='variables.css' \
            || true)
          if [ -n "$violations" ]; then
            echo "::error::Inline hex colors found outside variables.css. Route all colors through CSS tokens."
            echo "$violations"
            exit 1
          fi
          echo "No inline hex colors found. Design system enforced."

  # ── Supply-chain security ─────────────────────────────────────────
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit
        working-directory: src-tauri

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check all
          manifest-path: src-tauri/Cargo.toml
