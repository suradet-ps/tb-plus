name: Rust Safety Check

on: [push, pull_request]

jobs:
  clippy-pedantic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install system dependencies (Tauri on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Create dist placeholder (required by tauri::generate_context!)
        run: mkdir -p dist && touch dist/index.html

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"

      - run: cargo clippy --all-targets -- -D warnings

  miri-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        crate:
          - tb-models
          - tb-logic
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Rust Cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"

      - run: cargo +nightly miri test -p ${{ matrix.crate }}
