name: Rust Safety Check

on: [push, pull_request]

permissions:
  contents: read

jobs:
  clippy-pedantic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install system dependencies (Tauri on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Create dist placeholder (required by tauri::generate_context!)
        run: mkdir -p dist && touch dist/index.html

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: ". -> target"

      - run: cargo clippy --all-targets -- -D warnings

  miri-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        crate:
          - tb-models
          - tb-logic
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: miri

      - name: Rust Cache
        uses: swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: ". -> target"

      - run: cargo +nightly miri test -p ${{ matrix.crate }}
