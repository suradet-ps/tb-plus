<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sabot TB Clinic</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;
        background: #f6f5f4;
        color: rgba(0, 0, 0, 0.95);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #app {
        height: 100%;
        width: 100%;
      }

      /* ── Init Splash ─────────────────────────────────────────────────────
         Lives inside #app and is automatically discarded when Vue mounts
         (Vue replaces #app's innerHTML on createApp().mount('#app')).
         Pure HTML + CSS — no JS required, so it renders on the very first
         paint, eliminating the blank-white-window problem.
      ──────────────────────────────────────────────────────────────────── */
      .init-splash {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background: #f6f5f4;
      }

      .init-splash__card {
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 16px;
        /* multi-layer card shadow from DESIGN.md */
        box-shadow:
          rgba(0, 0, 0, 0.04) 0px 4px 18px,
          rgba(0, 0, 0, 0.027) 0px 2.025px 7.847px,
          rgba(0, 0, 0, 0.02) 0px 0.8px 2.925px,
          rgba(0, 0, 0, 0.01) 0px 0.175px 1.041px;
        padding: 40px 52px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        min-width: 300px;
        position: relative;
        overflow: hidden;
        /* subtle entrance */
        animation: splashIn 0.22s ease-out both;
      }

      /* Blue → Teal gradient accent line at the bottom of the card */
      .init-splash__card::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, #0075de 0%, #2a9d99 100%);
        opacity: 0.65;
      }

      /* Decorative background circle (top-right) */
      .init-splash__card::before {
        content: '';
        position: absolute;
        top: -60px;
        right: -60px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(0, 117, 222, 0.04);
        pointer-events: none;
      }

      .init-splash__icon {
        width: 54px;
        height: 54px;
        border-radius: 14px;
        background: rgba(0, 117, 222, 0.08);
        border: 1px solid rgba(0, 117, 222, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .init-splash__text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        text-align: center;
      }

      .init-splash__name {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: rgba(0, 0, 0, 0.95);
        line-height: 1.2;
      }

      .init-splash__sub {
        font-size: 12px;
        color: #a39e98;
        line-height: 1.6;
      }

      /* Three-dot pulse loading indicator */
      .init-splash__dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .init-splash__dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #0075de;
        opacity: 0.25;
        animation: dotPulse 1.25s ease-in-out infinite;
      }

      .init-splash__dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .init-splash__dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes dotPulse {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: scale(0.85);
        }
        40% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      @keyframes splashIn {
        from {
          opacity: 0;
          transform: translateY(6px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body autocapitalize="none" spellcheck="false">
    <!--
      #app contains the pre-Vue init splash.
      Vue's createApp().mount('#app') replaces this innerHTML automatically,
      so no extra JavaScript cleanup is needed.
    -->
    <div id="app">
      <div class="init-splash">
        <div class="init-splash__card">
          <!-- Activity / EKG icon — matches the Lucide icon used in the sidebar -->
          <div class="init-splash__icon">
            <svg
              width="26"
              height="26"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#0075de"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>
          </div>

          <div class="init-splash__text">
            <div class="init-splash__name">Sabot TB Clinic</div>
            <div class="init-splash__sub">
              ระบบบริหารจัดการคลินิกวัณโรค<br />โรงพยาบาลสรบอสอต
            </div>
          </div>

          <div class="init-splash__dots">
            <div class="init-splash__dot"></div>
            <div class="init-splash__dot"></div>
            <div class="init-splash__dot"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
