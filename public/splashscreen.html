<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sabot TB Clinic</title>
    <style>
      :root {
        --color-bg: #ffffff;
        --color-text: rgba(0, 0, 0, 0.95);
        --color-text-secondary: #615d59;
        --color-text-muted: #a39e98;
        --color-blue: #0075de;
        --color-teal: #2a9d99;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--color-bg);
        font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        -webkit-user-select: none;
      }

      .splash {
        width: 100%;
        height: 100%;
        background: var(--color-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 32px;
        position: relative;
        overflow: hidden;
      }

      /* Subtle top-right decorative circle */
      .splash::before {
        content: '';
        position: absolute;
        top: -70px;
        right: -70px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: rgba(0, 117, 222, 0.04);
        pointer-events: none;
      }

      /* Subtle bottom-left decorative circle */
      .splash::after {
        content: '';
        position: absolute;
        bottom: -50px;
        left: -50px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(42, 157, 153, 0.04);
        pointer-events: none;
      }

      .icon-wrap {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: rgba(0, 117, 222, 0.08);
        border: 1px solid rgba(0, 117, 222, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .text-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        text-align: center;
      }

      .app-name {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--color-text);
        line-height: 1.2;
      }

      .app-subtitle {
        font-size: 11.5px;
        color: var(--color-text-muted);
        line-height: 1.55;
      }

      .loading-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 9px;
      }

      .dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--color-blue);
        opacity: 0.25;
        animation: pulse 1.2s ease-in-out infinite;
      }

      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes pulse {
        0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
        40%            { opacity: 1;    transform: scale(1.1);  }
      }

      .loading-label {
        font-size: 11px;
        color: var(--color-text-muted);
        letter-spacing: 0.01em;
      }

      .version-label {
        position: absolute;
        bottom: 14px;
        font-size: 10px;
        color: var(--color-text-muted);
        opacity: 0.5;
      }

      /* thin bottom accent line */
      .accent-line {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          var(--color-blue) 0%,
          var(--color-teal) 100%
        );
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <!-- Icon -->
      <div class="icon-wrap">
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#0075de"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        </svg>
      </div>

      <!-- Text -->
      <div class="text-group">
        <div class="app-name">Sabot TB Clinic</div>
        <div class="app-subtitle">
          ระบบบริหารจัดการคลินิกวัณโรค<br />โรงพยาบาลสรบอสอต
        </div>
      </div>

      <!-- Loading indicator -->
      <div class="loading-wrap">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="loading-label">กำลังโหลด...</div>
      </div>

      <div class="version-label">v0.1.0</div>
      <div class="accent-line"></div>
    </div>
  </body>
</html>
